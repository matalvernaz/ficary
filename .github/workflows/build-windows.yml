name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install ".[all]"
          pip install pyinstaller

      - name: Download ffmpeg
        shell: bash
        # GitHub's "/releases/download/latest/..." redirect is occasionally
        # rate-limited or serves a ~92-byte stub instead of the real zip.
        # curl --retry only retries on transport errors, so we have to
        # size-check the payload ourselves and loop on a too-small file.
        run: |
          url=https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          for attempt in 1 2 3 4 5; do
            curl -L --fail --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 30 --max-time 300 \
              -o ffmpeg.zip "$url" || true
            size=$(wc -c < ffmpeg.zip 2>/dev/null || echo 0)
            echo "Attempt $attempt: ffmpeg.zip is $size bytes"
            if [ "$size" -gt 1000000 ]; then
              break
            fi
            echo "Too small; retrying in 15s..."
            sleep 15
          done
          if [ "$(wc -c < ffmpeg.zip)" -lt 1000000 ]; then
            echo "ffmpeg.zip never reached a sane size — failing the build."
            exit 1
          fi
          unzip -j ffmpeg.zip "*/bin/ffmpeg.exe" "*/bin/ffprobe.exe" -d ffmpeg_bin/
          ls -la ffmpeg_bin/

      # Build ZipExtractor.exe from ravibpatel/AutoUpdater.NET (MIT). It's
      # the self-update helper used here and by Libation: waits for our
      # PID via Process.WaitForExit, extracts the update zip over the
      # install, uses Windows Restart Manager to diagnose locked files,
      # and relaunches. Target framework is net45 — preinstalled on every
      # Windows 8+ machine, so no .NET runtime install for users.
      #
      # Uses VS MSBuild, not `dotnet build`: .NET SDK 10's resource
      # pipeline errors out on net45 WinForms .resx files containing
      # non-string resources (MSB3823 / MSB3822). MSBuild from VS
      # handles the legacy Framework path correctly.
      - uses: microsoft/setup-msbuild@v3
      - name: Build ZipExtractor.exe
        shell: pwsh
        run: |
          $tag = 'v1.9.2'
          git clone --depth 1 --branch $tag https://github.com/ravibpatel/AutoUpdater.NET.git zipextractor_src
          # The csproj targets net45 and gates a System.IO.Compression
          # reference on that target. windows-latest runners only ship
          # targeting packs for current .NET Framework versions
          # (4.7.2 / 4.8), so retarget to net48 — present on every
          # Win10 1803+ (May 2019). Rewrite both the <TargetFramework>
          # element and the `'net45'` literal in the conditional
          # ItemGroup so its Reference items (System.IO.Compression,
          # System.IO.Compression.FileSystem, System.Windows.Forms)
          # actually resolve.
          $csproj = 'zipextractor_src/ZipExtractor/ZipExtractor.csproj'
          $text = Get-Content $csproj -Raw
          $text = $text.Replace('<TargetFramework>net45</TargetFramework>', '<TargetFramework>net48</TargetFramework>')
          $text = $text.Replace("'net45'", "'net48'")
          Set-Content $csproj $text
          # /restore runs NuGet restore first — SDK-style csproj needs
          # project.assets.json generated before msbuild can resolve
          # targets, even with no PackageReferences.
          # SignAssembly=false skips the strong-name signing step; the
          # repo doesn't ship ZipExtractor.snk, and we don't need a
          # signed assembly here (the exe's authenticity is already
          # covered by the main exe's signature path).
          msbuild $csproj /restore /p:Configuration=Release /p:SignAssembly=false /v:minimal
          New-Item -ItemType Directory -Force -Path zipextractor_bin | Out-Null
          Copy-Item zipextractor_src/AutoUpdater.NET/Resources/ZipExtractor.exe zipextractor_bin/
          Get-ChildItem zipextractor_bin/

      # --onedir (not --onefile) — produces dist\ficary\ with the exe +
      # _internal\ next to it. That folder is what we zip up and ship.
      # Portable install layout: users unzip the archive anywhere, all
      # runtime data (settings, cache, neural deps) lives in the same
      # folder as the exe.
      - name: Build executable
        shell: bash
        # --collect-submodules ficary walks every submodule under the
        # package so new files (optional_features, cf_solve, library.*,
        # erotica.*, etc.) are picked up automatically without
        # maintaining an explicit hidden-import list. The --hidden-import
        # lines that remain are for third-party packages whose lazy
        # imports PyInstaller's static analysis doesn't see.
        run: |
          pyinstaller --onedir --name ficary --console \
            --add-binary "ffmpeg_bin/ffmpeg.exe;." \
            --add-binary "ffmpeg_bin/ffprobe.exe;." \
            --collect-submodules ficary \
            --hidden-import edge_tts \
            --hidden-import ebooklib \
            --hidden-import curl_cffi \
            --hidden-import wx \
            --collect-all curl_cffi \
            --collect-all wx \
            ficary/__main__.py

      - name: Smoke-test executable
        run: dist\ficary\ficary.exe --help

      # Drop the update helper alongside ficary.exe so the auto-updater
      # in ficary/self_update.py can copy it to %TEMP% and spawn it.
      - name: Bundle ZipExtractor.exe
        shell: pwsh
        run: Copy-Item zipextractor_bin/ZipExtractor.exe dist/ficary/

      # Compat shim for the ffn-dl -> ficary rename: every 2.4.x install's
      # auto-updater downloads this zip and refuses to install unless it
      # finds an exe named ffn-dl.exe (it matches on its own running exe
      # name). Ship a second copy under the old name so the existing
      # installed base can cross the rename; their install keeps running
      # as ffn-dl.exe and self_update.py accepts either name from then on.
      # Keep until 2.4.x installs have plausibly all upgraded.
      - name: Bundle ffn-dl.exe rename shim
        shell: pwsh
        run: Copy-Item dist/ficary/ficary.exe dist/ficary/ffn-dl.exe

      # Pack the whole dist\ficary\ folder into a zip the user can
      # unpack anywhere. Compress-Archive with a trailing path segment
      # keeps "ficary" as the top-level folder inside the archive.
      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist\ficary -DestinationPath dist\ficary-portable.zip -Force
          Get-ChildItem dist\ficary-portable.zip | Format-List Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ficary-windows-portable
          path: dist/ficary-portable.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/ficary-portable.zip
