name: Build macOS Binary

# Produces a clickable macOS arm64 ``.app`` bundle for each v-tag
# release. Apple-Silicon only — Intel Mac users install via pip.
# Accessibility: wxPython on macOS wraps native Cocoa widgets, which
# VoiceOver reads the same way it reads any macOS app; CLI users can
# still invoke the binary inside the bundle directly
# (``ffn-dl.app/Contents/MacOS/ffn-dl --url ...``).
#
# The build is unsigned — users hit Gatekeeper on first launch.
# Code-signing + notarization would need a paid Apple Developer
# account; the README documents the right-click → Open workaround.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # macos-latest is arm64 (Apple Silicon) as of the mid-2024
    # runner swap. Produces an arm64 binary; Rosetta 2 lets Intel
    # Macs run it but a native Intel build would need macos-13.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ffmpeg and ffprobe
        # Evermeet ships static-built macOS binaries of ffmpeg and
        # ffprobe with no runtime dependencies beyond the macOS
        # system libs. Same "bundle it, don't require users to
        # brew install" philosophy the Windows build uses.
        # evermeet.cx is a small single-server host like John Van
        # Sickle's; same retry rationale as build-linux.yml — one
        # transient connection timeout shouldn't fail the release.
        run: |
          set -e
          mkdir -p ffmpeg_bin
          curl -L --fail \
            --retry 5 --retry-delay 15 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          curl -L --fail \
            --retry 5 --retry-delay 15 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            -o ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o ffmpeg.zip -d ffmpeg_bin/
          unzip -o ffprobe.zip -d ffmpeg_bin/
          chmod +x ffmpeg_bin/ffmpeg ffmpeg_bin/ffprobe
          ls -la ffmpeg_bin/

      - name: Install Python dependencies
        # wxPython ships macOS wheels on PyPI for both arm64 and
        # x86_64, so the plain install works without the extras
        # URL dance the Linux build needs.
        run: |
          python -m pip install --upgrade pip
          pip install ".[all]"
          pip install pyinstaller

      - name: Build app bundle
        # ``--windowed`` is the macOS-specific flag that wraps the
        # ``--onedir`` output in a proper ``.app`` bundle so Finder
        # treats it as an application: double-clickable, draggable
        # to /Applications, no Terminal window pops up at launch.
        # Without it, PyInstaller produces a bare directory of
        # binaries that CLI users can run but GUI users can't open
        # the normal way.
        #
        # ``--collect-submodules ffn_dl`` scoops up every submodule
        # under the package so new files land in the bundle without
        # maintaining a hidden-import list.
        run: |
          pyinstaller --onedir --name ffn-dl --windowed \
            --add-binary "ffmpeg_bin/ffmpeg:." \
            --add-binary "ffmpeg_bin/ffprobe:." \
            --collect-submodules ffn_dl \
            --hidden-import edge_tts \
            --hidden-import ebooklib \
            --hidden-import curl_cffi \
            --hidden-import wx \
            --collect-all curl_cffi \
            --collect-all wx \
            ffn_dl/__main__.py

      - name: Smoke-test bundle
        # --windowed builds put the binary inside Contents/MacOS;
        # CLI users will invoke it the same way.
        run: dist/ffn-dl.app/Contents/MacOS/ffn-dl --help

      - name: Package
        # ``ditto`` preserves macOS metadata (extended attributes,
        # the executable bit, resource forks) that a plain ``zip``
        # can mangle on .app bundles — without it the unzipped app
        # sometimes refuses to launch with "damaged" errors before
        # Gatekeeper even gets a chance to weigh in.
        run: |
          cd dist
          ditto -c -k --keepParent --sequesterRsrc ffn-dl.app ffn-dl-macos-arm64.zip
          ls -la ffn-dl-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ffn-dl-macos-arm64
          path: dist/ffn-dl-macos-arm64.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/ffn-dl-macos-arm64.zip
